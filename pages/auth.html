<div class="panels">
    <form id="login-panel" class="panel active" onsubmit="handleLogin(event)" autocomplete="off">
      <div class="field">
        <label>Username</label>
        <input type="text" id="log-username" required placeholder="Masukkan username" autocomplete="off" />
      </div>
      <div class="field">
        <label>Kata Sandi</label>
        <input type="password" id="log-password" required placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" id="btn-login" class="btn-login">Masuk ke Kebun</button>
    </form>

    <form id="reg-panel" class="panel" onsubmit="handleRegister(event)" autocomplete="off">
      <div class="field">
        <label>Nama Lengkap</label>
        <input type="text" id="reg-nama" required placeholder="Contoh: Ahmad Subarjo" autocomplete="off" />
      </div>
      <div class="field">
        <label>Buat Username</label>
        <input type="text" id="reg-username" required placeholder="Username untuk login" autocomplete="off" />
      </div>
      <div class="field">
        <label>Kata Sandi</label>
        <input type="password" id="reg-password" required placeholder="Buat kata sandi" autocomplete="new-password" />
      </div>
      <button type="submit" id="btn-reg" class="btn-reg">Daftarkan Akun</button>
    </form>
  </div>
