<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kebun GSG 07 - Akses</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdf8f0; color: #1a3a1a; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-emerald-100 p-6 space-y-6">
    <div class="text-center">
      <h2 class="text-xl font-bold text-emerald-900">Gerbang Akses GSG 07</h2>
      <p class="text-xs text-emerald-600 mt-1">Silakan masuk atau daftar akun untuk mengakses sistem kebun warga.</p>
    </div>

    <div id="alert-box" class="hidden text-xs p-3 rounded-lg border"></div>

    <div class="flex bg-emerald-50 p-1 rounded-xl">
      <button onclick="switchTab('login-form')" id="btn-login-tab" class="flex-1 text-center py-2 text-xs font-semibold rounded-lg bg-white shadow text-emerald-900">Masuk</button>
      <button onclick="switchTab('reg-form')" id="btn-reg-tab" class="flex-1 text-center py-2 text-xs font-semibold rounded-lg text-emerald-600">Daftar Baru</button>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-emerald-800 mb-1">Username</label>
        <input type="text" id="login-username" required class="w-full text-sm border border-emerald-200 rounded-xl p-3 bg-emerald-50/30 focus:outline-emerald-600">
      </div>
      <div>
        <label class="block text-xs font-semibold text-emerald-800 mb-1">Password</label>
        <input type="password" id="login-password" required class="w-full text-sm border border-emerald-200 rounded-xl p-3 bg-emerald-50/30 focus:outline-emerald-600">
      </div>
      <button type="submit" class="w-full bg-emerald-700 text-white font-bold p-3 rounded-xl text-sm hover:bg-emerald-800 transition">Masuk ke Kebun</button>
    </form>

    <form id="reg-form" onsubmit="handleRegister(event)" class="space-y-4 hidden">
      <div>
        <label class="block text-xs font-semibold text-emerald-800 mb-1">Nama Lengkap</label>
        <input type="text" id="reg-nama" required class="w-full text-sm border border-emerald-200 rounded-xl p-3 bg-emerald-50/30 focus:outline-emerald-600" placeholder="Contoh: Pak Budi">
      </div>
      <div>
        <label class="block text-xs font-semibold text-emerald-800 mb-1">Username</label>
        <input type="text" id="reg-username" required class="w-full text-sm border border-emerald-200 rounded-xl p-3 bg-emerald-50/30 focus:outline-emerald-600">
      </div>
      <div>
        <label class="block text-xs font-semibold text-emerald-800 mb-1">Password</label>
        <input type="password" id="reg-password" required class="w-full text-sm border border-emerald-200 rounded-xl p-3 bg-emerald-50/30 focus:outline-emerald-600">
      </div>
      <button type="submit" class="w-full bg-amber-600 text-white font-bold p-3 rounded-xl text-sm hover:bg-amber-700 transition">Daftarkan Akun Selesai</button>
    </form>
  </div>

  <script>
    // KONFIGURASI SUPABASE (Ganti dengan milikmu beneran)
    const SUPABASE_URL = "https://iyujfrhyggnpuzflznrk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_s7lrRYSClBRfyqA8wYTkNA_OlOqbcsp";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const alertBox = document.getElementById('alert-box');

    function showAlert(message, type) {
        alertBox.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border-red-200', 'bg-emerald-50', 'text-emerald-700', 'border-emerald-200');
        if(type === 'error') {
            alertBox.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
        } else {
            alertBox.classList.add('bg-emerald-50', 'text-emerald-700', 'border-emerald-200');
        }
        alertBox.innerText = message;
    }

    function switchTab(formId) {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('reg-form').classList.add('hidden');
      document.getElementById(formId).classList.remove('hidden');
      alertBox.classList.add('hidden');

      document.getElementById('btn-login-tab').className = "flex-1 text-center py-2 text-xs font-semibold rounded-lg text-emerald-600";
      document.getElementById('btn-reg-tab').className = "flex-1 text-center py-2 text-xs font-semibold rounded-lg text-emerald-600";

      if(formId === 'login-form') {
        document.getElementById('btn-login-tab').className = "flex-1 text-center py-2 text-xs font-semibold rounded-lg bg-white shadow text-emerald-900";
      } else {
        document.getElementById('btn-reg-tab').className = "flex-1 text-center py-2 text-xs font-semibold rounded-lg bg-white shadow text-emerald-900";
      }
    }

    // Eksekusi Login beneran ke Supabase tanpa PHP
    async function handleLogin(e) {
        e.preventDefault();
        const userVal = document.getElementById('login-username').value;
        const passVal = document.getElementById('login-password').value;

        const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('username', userVal)
            .single();

        if (error || !data) {
            showAlert("Username tidak terdaftar!", "error");
            return;
        }

        if (data.password === passVal) {
            // Set session di localStorage browser
            localStorage.setItem('user_session', JSON.stringify({
                user_id: data.id,
                nama: data.nama,
                role: data.role
            }));
            window.location.href = "beranda.html";
        } else {
            showAlert("Password salah!", "error");
        }
    }

    // Eksekusi Register beneran ke Supabase
    async function handleRegister(e) {
        e.preventDefault();
        const nama = document.getElementById('reg-nama').value;
        const username = document.getElementById('reg-username').value;
        const password = document.getElementById('reg-password').value;

        // Cek dulu apakah username sudah dipakai
        const { data: userExist } = await supabase
            .from('users')
            .select('username')
            .eq('username', username);

        if (userExist && userExist.length > 0) {
            showAlert("Username sudah digunakan!", "error");
            return;
        }

        // Masukkan data baru dengan role default Warga
        const { error } = await supabase
            .from('users')
            .insert([{ nama, username, password, role: 'Warga' }]);

        if (error) {
            showAlert("Gagal mendaftar, coba lagi.", "error");
        } else {
            showAlert("Pendaftaran berhasil! Silakan klik tab Masuk.", "success");
            document.getElementById('reg-form').reset();
        }
    }
  </script>
</body>
</html>
