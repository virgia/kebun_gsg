<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kebun GSG 07 - Akses</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --g50: #ecfdf5;
        --g100: #d1fae5;
        --g200: #a7f3d0;
        --g300: #6ee7b7;
        --g400: #34d399;
        --g500: #10b981;
        --g600: #059669;
        --g700: #047857;
        --g800: #065f46;
        --g900: #064e3b;
      }

      body {
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background-color: #0d2818;
        overflow: hidden;
        position: relative;
      }

      /* Background blobs - menggunakan will-change agar GPU-accelerated */
      .bg-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }
      .bg-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.35;
        animation: floatBlob 12s ease-in-out infinite;
        will-change: transform; /* GPU acceleration */
      }
      .blob-1 {
        width: 520px;
        height: 520px;
        background: #065f46;
        top: -120px;
        left: -100px;
        animation-delay: 0s;
      }
      .blob-2 {
        width: 400px;
        height: 400px;
        background: #064e3b;
        bottom: -80px;
        right: -80px;
        animation-delay: -4s;
      }
      .blob-3 {
        width: 300px;
        height: 300px;
        background: #10b981;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.12;
        animation-delay: -8s;
      }

      @keyframes floatBlob {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(20px, -30px) scale(1.04);
        }
        66% {
          transform: translate(-15px, 20px) scale(0.97);
        }
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image: radial-gradient(
          circle at 1px 1px,
          rgba(52, 211, 153, 0.08) 1px,
          transparent 0
        );
        background-size: 32px 32px;
      }

      /* Card */
      .card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 36px 32px 32px;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow:
          0 0 0 1px rgba(52, 211, 153, 0.1),
          0 32px 64px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .card-header {
        text-align: center;
        margin-bottom: 28px;
      }
      .card-title {
        font-family: "DM Serif Display", serif;
        font-size: 22px;
        color: #fff;
        letter-spacing: -0.3px;
        line-height: 1.2;
      }
      .card-subtitle {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 4px;
      }

      /* Tabs */
      .tab-bar {
        display: flex;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 12px;
        padding: 4px;
        margin-bottom: 24px;
        position: relative;
      }
      .tab-slider {
        position: absolute;
        top: 4px;
        bottom: 4px;
        left: 4px;
        width: calc(50% - 4px);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        will-change: transform;
      }
      .tab-btn {
        flex: 1;
        padding: 8px;
        background: none;
        border: none;
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 8px;
        position: relative;
        z-index: 2;
        transition: color 0.2s;
      }
      .tab-btn.active {
        color: #fff;
      }
      .tab-btn:not(.active) {
        color: rgba(255, 255, 255, 0.4);
      }

      /* Panels */
      .panels {
        position: relative;
      }
      .panel {
        opacity: 0;
        transform: translateY(6px);
        pointer-events: none;
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        display: none;
      }
      .panel.active {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
        display: block;
      }

      /* Fields */
      .field {
        margin-bottom: 14px;
      }
      .field label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 6px;
      }
      .field input {
        width: 100%;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 12px 16px;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        color: #fff;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .field input::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }
      .field input:focus {
        border-color: rgba(52, 211, 153, 0.5);
        box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.1);
      }

      /* Buttons */
      .btn-primary {
        width: 100%;
        margin-top: 8px;
        padding: 13px;
        background: linear-gradient(135deg, #059669 0%, #34d399 100%);
        border: none;
        border-radius: 12px;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        letter-spacing: 0.2px;
        transition:
          opacity 0.2s,
          transform 0.15s;
        box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
      }
      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-primary:active {
        transform: scale(0.99);
      }
      .btn-primary:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        width: 100%;
        margin-top: 8px;
        padding: 13px;
        background: rgba(52, 211, 153, 0.12);
        border: 1px solid rgba(52, 211, 153, 0.3);
        border-radius: 12px;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #34d399;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
      }
      .btn-secondary:hover {
        background: rgba(52, 211, 153, 0.2);
        transform: translateY(-1px);
      }
      .btn-secondary:active {
        transform: translateY(0);
      }
      .btn-secondary:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      /* Alert */
      .alert {
        display: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 500;
        text-align: center;
        margin-bottom: 18px;
        animation: alertIn 0.3s ease both;
      }
      @keyframes alertIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .alert.success {
        background: rgba(52, 211, 153, 0.12);
        border: 1px solid rgba(52, 211, 153, 0.25);
        color: #34d399;
      }
      .alert.error {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.2);
        color: #f87171;
      }

      .card-footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.25);
        letter-spacing: 0.3px;
      }

      /* Indikator keamanan password */
      .security-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 9px;
        color: rgba(52, 211, 153, 0.6);
        margin-top: 4px;
      }
      .security-badge svg {
        width: 10px;
        height: 10px;
        stroke: currentColor;
        fill: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-canvas">
      <div class="bg-blob blob-1"></div>
      <div class="bg-blob blob-2"></div>
      <div class="bg-blob blob-3"></div>
    </div>
    <div class="bg-grid"></div>

    <div class="card">
      <div class="card-header">
        <h1 class="card-title">Kebun GSG 07</h1>
        <p class="card-subtitle">Silakan verifikasi akun Anda</p>
      </div>

      <div class="tab-bar">
        <div class="tab-slider" id="tab-slider"></div>
        <button
          class="tab-btn active"
          id="tab-login"
          onclick="switchTab('login')"
        >
          Masuk
        </button>
        <button class="tab-btn" id="tab-reg" onclick="switchTab('reg')">
          Daftar
        </button>
      </div>

      <div id="alert-box" class="alert"></div>

      <div class="panels">
        <form
          id="login-panel"
          class="panel active"
          onsubmit="handleLogin(event)"
          autocomplete="off"
        >
          <div class="field">
            <label>Username</label>
            <input
              type="text"
              id="log-username"
              required
              placeholder="Masukkan username"
              autocomplete="off"
            />
          </div>
          <div class="field">
            <label>Kata Sandi</label>
            <input
              type="password"
              id="log-password"
              required
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
          <button type="submit" id="btn-login" class="btn-primary">
            Masuk ke Kebun
          </button>
        </form>

        <form
          id="reg-panel"
          class="panel"
          onsubmit="handleRegister(event)"
          autocomplete="off"
        >
          <div class="field">
            <label>Nama Lengkap</label>
            <input
              type="text"
              id="reg-nama"
              required
              placeholder="Contoh: Ahmad Subarjo"
              autocomplete="off"
            />
          </div>
          <div class="field">
            <label>Buat Username</label>
            <input
              type="text"
              id="reg-username"
              required
              placeholder="Username untuk login"
              autocomplete="off"
            />
          </div>
          <div class="field">
            <label>Kata Sandi</label>
            <input
              type="password"
              id="reg-password"
              required
              placeholder="Buat kata sandi (min. 6 karakter)"
              minlength="6"
              autocomplete="new-password"
            />
            <div class="security-badge">
              <svg viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                />
              </svg>
              Password dienkripsi sebelum disimpan
            </div>
          </div>
          <button type="submit" id="btn-reg" class="btn-secondary">
            Daftarkan Akun
          </button>
        </form>
      </div>

      <div class="card-footer">Sistem Monitoring Kebun Terintegrasi RW 07</div>
    </div>

    <script>
      const SUPABASE_URL = "https://iyujfrhyggnpuzflznrk.supabase.co";
      const SUPABASE_KEY = "sb_publishable_s7lrRYSClBRfyqA8wYTkNA_OlOqbcsp";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY,
      );

      // Redirect jika sudah login
      try {
        if (localStorage.getItem("user_session"))
          window.location.replace("beranda.html");
      } catch (e) {}

      // ── Hash password dengan SHA-256 (Web Crypto API — built-in browser) ──
      async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");
      }

      function switchTab(tab) {
        const loginPanel = document.getElementById("login-panel");
        const regPanel = document.getElementById("reg-panel");
        const tabLogin = document.getElementById("tab-login");
        const tabReg = document.getElementById("tab-reg");
        const slider = document.getElementById("tab-slider");
        hideAlert();
        if (tab === "login") {
          regPanel.classList.remove("active");
          loginPanel.classList.add("active");
          tabLogin.classList.add("active");
          tabReg.classList.remove("active");
          slider.style.transform = "translateX(0)";
        } else {
          loginPanel.classList.remove("active");
          regPanel.classList.add("active");
          tabReg.classList.add("active");
          tabLogin.classList.remove("active");
          slider.style.transform = "translateX(100%)";
        }
      }

      function showAlert(msg, type) {
        const box = document.getElementById("alert-box");
        box.textContent = msg;
        box.className = "alert " + type;
        box.style.display = "block";
        // restart animation
        box.style.animation = "none";
        void box.offsetWidth;
        box.style.animation = "";
      }

      function hideAlert() {
        document.getElementById("alert-box").style.display = "none";
      }

      async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById("log-username").value.trim();
        const password = document.getElementById("log-password").value;
        const btn = document.getElementById("btn-login");
        btn.textContent = "Memverifikasi...";
        btn.disabled = true;

        try {
          const hashedPw = await hashPassword(password);
          const { data, error } = await supabaseClient
            .from("users")
            .select("*")
            .eq("username", username)
            .eq("password", hashedPw);
          if (error) throw error;

          if (data && data.length > 0) {
            // Simpan session tanpa password
            const safeUser = {
              id: data[0].id,
              nama: data[0].nama,
              username: data[0].username,
              role: data[0].role,
            };
            localStorage.setItem("user_session", JSON.stringify(safeUser));
            showAlert("Akses disetujui! Mengalihkan...", "success");
            setTimeout(() => window.location.replace("beranda.html"), 700);
          } else {
            showAlert("Username atau kata sandi salah!", "error");
            btn.textContent = "Masuk ke Kebun";
            btn.disabled = false;
          }
        } catch (err) {
          showAlert("Kendala jaringan: " + err.message, "error");
          btn.textContent = "Masuk ke Kebun";
          btn.disabled = false;
        }
      }

      async function handleRegister(e) {
        e.preventDefault();
        const nama = document.getElementById("reg-nama").value.trim();
        const username = document.getElementById("reg-username").value.trim();
        const password = document.getElementById("reg-password").value;
        const btn = document.getElementById("btn-reg");
        btn.textContent = "Mendaftarkan...";
        btn.disabled = true;

        if (password.length < 6) {
          showAlert("Kata sandi minimal 6 karakter!", "error");
          btn.textContent = "Daftarkan Akun";
          btn.disabled = false;
          return;
        }

        try {
          // Cek username duplikat
          const { data: existing, error: checkErr } = await supabaseClient
            .from("users")
            .select("username")
            .eq("username", username);
          if (checkErr) throw checkErr;
          if (existing && existing.length > 0) {
            showAlert("Username sudah digunakan warga lain!", "error");
            btn.textContent = "Daftarkan Akun";
            btn.disabled = false;
            return;
          }

          // Hash password sebelum simpan
          const hashedPw = await hashPassword(password);

          const { error: insertErr } = await supabaseClient
            .from("users")
            .insert([{ nama, username, password: hashedPw, role: "Warga" }]);
          if (insertErr) throw insertErr;

          showAlert("Pendaftaran berhasil! Silakan masuk.", "success");
          document.getElementById("reg-panel").reset();
          setTimeout(() => {
            switchTab("login");
            btn.textContent = "Daftarkan Akun";
            btn.disabled = false;
          }, 1000);
        } catch (err) {
          showAlert("Gagal mendaftar: " + err.message, "error");
          btn.textContent = "Daftarkan Akun";
          btn.disabled = false;
        }
      }

      // Konfigurasi durasi (5 menit dalam milidetik)
      const TIMEOUT_DURATION = 3 * 60 * 1000;
      let logoutTimer;

      function resetTimer() {
        clearTimeout(logoutTimer);
        logoutTimer = setTimeout(performLogout, TIMEOUT_DURATION);
      }

      function performLogout() {
        // 1. Hapus session dari localStorage
        localStorage.removeItem("user_session");

        // 2. Berikan penanda di URL bahwa user keluar karena timeout
        // Ini agar di halaman auth kita bisa memunculkan pesan box merah yang rapi daripada alert pop-up
        window.location.replace("auth.html?reason=timeout");
      }

      // Pantau aktivitas user di halaman ini
      document.addEventListener("DOMContentLoaded", resetTimer);
      document.addEventListener("mousemove", resetTimer);
      document.addEventListener("keypress", resetTimer);
      document.addEventListener("click", resetTimer);
      document.addEventListener("scroll", resetTimer);
      document.addEventListener("touchstart", resetTimer); // support mobile
    </script>
  </body>
</html>
