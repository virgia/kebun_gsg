<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kebun GSG 07 - Edit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#fdf8f0] text-[#1a3a1a] p-4">

  <div class="max-w-md mx-auto bg-white p-5 rounded-xl border border-emerald-100 shadow-sm space-y-4">
    <div class="flex items-center gap-3 border-b pb-3 border-gray-100">
      <a href="kebun.html" class="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-gray-700 font-bold">←</a>
      <h1 class="font-bold text-base text-emerald-900">Edit Kondisi Tanaman</h1>
    </div>
    
    <form id="form-edit" onsubmit="handleUpdateTanaman(event)" class="grid grid-cols-1 gap-3.5 text-xs">
      <div>
        <label class="block font-semibold text-gray-600 mb-1">Nama Tanaman</label>
        <input type="text" id="edit-nama" required class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:outline-emerald-600">
      </div>

      <div>
        <label class="block font-semibold text-gray-600 mb-1">Kategori Tanaman</label>
        <select id="edit-kategori" required class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:outline-emerald-600 bg-white font-medium">
          <option value="Sayuran">Sayuran</option>
          <option value="Buah">Buah</option>
          <option value="Umbi-umbian">Umbi-umbian</option>
        </select>
      </div>

      <div>
        <label class="block font-semibold text-gray-600 mb-1">Tanggal Tanam</label>
        <input type="date" id="edit-tanggal" required class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:outline-emerald-600">
      </div>

      <div>
        <label class="block font-semibold text-gray-600 mb-1">Kondisi / Status Terbaru</label>
        <select id="statusSelect" onchange="updateSelectColor()" class="w-full border p-2.5 rounded-lg text-sm font-bold focus:outline-none transition-colors duration-200">
          <option value="Pembibitan" class="bg-white text-blue-700 font-semibold">Pembibitan</option>
          <option value="Pertumbuhan" class="bg-white text-emerald-700 font-semibold">Pertumbuhan</option>
          <option value="Siap Panen" class="bg-white text-amber-700 font-semibold">Siap Panen</option>
        </select>
      </div>

      <div class="pt-2 flex gap-2">
        <a href="kebun.html" class="w-1/3 text-center bg-gray-100 text-gray-700 font-bold p-2.5 rounded-lg hover:bg-gray-200 transition">Batal</a>
        <button type="submit" class="w-2/3 bg-emerald-700 text-white font-bold p-2.5 rounded-lg hover:bg-emerald-800 transition shadow">Simpan</button>
      </div>
    </form>
  </div>

  <script>
    // PROTEKSI HALAMAN (Hanya Admin yang boleh masuk halaman edit ini)
    const sessionData = localStorage.getItem('user_session');
    if (!sessionData || JSON.parse(sessionData).role !== 'Admin') {
        window.location.href = "kebun.html";
    }

    // KONEKSI SUPABASE
    const SUPABASE_URL = "https://iyujfrhyggnpuzflznrk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_s7lrRYSClBRfyqA8wYTkNA_OlOqbcsp";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Ambil ID dari Parameter URL (?id=xx)
    const urlParams = new URLSearchParams(window.location.search);
    const idTanaman = urlParams.get('id');

    if(!idTanaman) window.location.href = "kebun.html";

    // Ubah Warna Background Select Sesuai Nilai Status Terpilih
    function updateSelectColor() {
        const select = document.getElementById('statusSelect');
        const val = select.value;
        select.className = "w-full border p-2.5 rounded-lg text-sm font-bold focus:outline-none transition-colors duration-200 ";
        
        if (val === 'Pembibitan') select.classList.add('bg-blue-50', 'text-blue-800', 'border-blue-200');
        else if (val === 'Pertumbuhan') select.classList.add('bg-emerald-50', 'text-emerald-800', 'border-emerald-200');
        else if (val === 'Siap Panen') select.classList.add('bg-amber-50', 'text-amber-800', 'border-amber-200');
    }

    // Tarik Data Lama ke Form Sesuai ID
    async function loadTanamanDetail() {
        const { data, error } = await supabase
            .from('kebun')
            .select('*')
            .eq('id', idTanaman)
            .single();

        if(error || !data) {
            alert('Data tanaman tidak ditemukan!');
            window.location.href = "kebun.html";
            return;
        }

        document.getElementById('edit-nama').value = data.nama_tanaman;
        document.getElementById('edit-kategori').value = data.kategori;
        document.getElementById('edit-tanggal').value = data.tanggal_tanam;
        document.getElementById('statusSelect').value = data.status;
        updateSelectColor();
    }

    // Eksekusi Pembaruan Data
    async function handleUpdateTanaman(e) {
        e.preventDefault();
        const nama_tanaman = document.getElementById('edit-nama').value;
        const kategori = document.getElementById('edit-kategori').value;
        const tanggal_tanam = document.getElementById('edit-tanggal').value;
        const status = document.getElementById('statusSelect').value;

        const { error } = await supabase
            .from('kebun')
            .update({ nama_tanaman, kategori, tanggal_tanam, status })
            .eq('id', idTanaman);

        if(error) {
            alert('Gagal memperbarui data!');
        } else {
            window.location.href = "kebun.html";
        }
    }

    window.onload = loadTanamanDetail;
  </script>
</body>
</html>
