<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kebun GSG 07 — Edit Tanaman</title>
  <script>
    (function() {
      try {
        var s = localStorage.getItem('user_session');
        if (!s || JSON.parse(s).role !== 'Admin') window.location.replace('kebun.html');
      } catch(e) { window.location.replace('kebun.html'); }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f7ee; color: #1a3a1a;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }

    .card {
      width: 100%; max-width: 420px;
      background: #fff; border-radius: 16px;
      border: 1px solid rgba(45,106,45,0.15);
      box-shadow: 0 4px 24px rgba(26,58,26,0.1);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1a3a1a 0%, #244f24 100%);
      padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 8px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; text-decoration: none; flex-shrink: 0;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .back-btn svg { width: 16px; height: 16px; }
    .card-title { font-size: 0.9rem; font-weight: 700; color: #fff; }

    .card-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 0.875rem; }

    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 11px; font-weight: 600; color: #4b5563; }
    .form-input, .form-select {
      width: 100%; border: 1px solid #d1d5db;
      border-radius: 8px; padding: 10px 12px;
      font-family: 'Poppins', sans-serif; font-size: 12px;
      color: #1a3a1a; outline: none; background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus, .form-select:focus {
      border-color: #2d6a2d;
      box-shadow: 0 0 0 2px rgba(45,106,45,0.12);
    }
    .form-select { font-weight: 600; cursor: pointer; }

    /* Status select warna dinamis */
    .status-pembibitan { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .status-pertumbuhan { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }

    .card-footer {
      padding: 0 1.25rem 1.25rem;
      display: flex; gap: 8px;
    }
    .btn-batal {
      flex: 1; background: #f3f4f6; color: #374151;
      font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 700;
      border: 1px solid #d1d5db; border-radius: 8px; padding: 10px;
      text-align: center; text-decoration: none; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-batal:hover { background: #e5e7eb; }
    .btn-simpan {
      flex: 2; background: #14532d; color: #fff;
      font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 700;
      border: none; border-radius: 8px; padding: 10px;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(20,83,45,0.3);
    }
    .btn-simpan:hover { background: #166534; }
    .btn-simpan:active { transform: scale(0.99); }
    .btn-simpan:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Loading overlay */
    .loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 999;
      align-items: center; justify-content: center;
    }
    .loading-overlay.visible { display: flex; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
</div>

<div class="card">
  <div class="card-header">
    <a href="kebun.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>
    </a>
    <span class="card-title">Edit Kondisi Tanaman</span>
  </div>

  <form id="form-edit" onsubmit="handleUpdateTanaman(event)">
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Nama Tanaman</label>
        <input type="text" id="edit-nama" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">Kategori Tanaman</label>
        <select id="edit-kategori" class="form-select" required>
          <option value="Sayuran">Sayuran</option>
          <option value="Buah">Buah</option>
          <option value="Umbi-umbian">Umbi-umbian</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tanggal Tanam</label>
        <input type="date" id="edit-tanggal" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">Kondisi / Status Terbaru</label>
        <select id="statusSelect" class="form-select" onchange="updateSelectColor()">
          <option value="Pembibitan">Pembibitan</option>
          <option value="Pertumbuhan">Pertumbuhan</option>
        </select>
      </div>
    </div>
    <div class="card-footer">
      <a href="kebun.html" class="btn-batal">Batal</a>
      <button type="submit" id="btn-simpan" class="btn-simpan">Simpan Perubahan</button>
    </div>
  </form>
</div>

<script>
  const SUPABASE_URL = "https://iyujfrhyggnpuzflznrk.supabase.co";
  const SUPABASE_KEY = "sb_publishable_s7lrRYSClBRfyqA8wYTkNA_OlOqbcsp";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const urlParams  = new URLSearchParams(window.location.search);
  const idTanaman  = urlParams.get('id');
  if (!idTanaman) window.location.replace('kebun.html');

  function updateSelectColor() {
    const sel = document.getElementById('statusSelect');
    sel.className = 'form-select';
    if (sel.value === 'Pembibitan')  sel.classList.add('status-pembibitan');
    if (sel.value === 'Pertumbuhan') sel.classList.add('status-pertumbuhan');
  }

  function showLoading(show) {
    document.getElementById('loading-overlay').classList.toggle('visible', show);
  }

  async function loadTanamanDetail() {
    showLoading(true);
    const { data, error } = await supabaseClient
      .from('kebun').select('*').eq('id', idTanaman).single();
    showLoading(false);

    if (error || !data) {
      alert('Data tidak ditemukan!');
      window.location.replace('kebun.html');
      return;
    }
    document.getElementById('edit-nama').value       = data.nama_tanaman;
    document.getElementById('edit-kategori').value   = data.kategori;
    document.getElementById('edit-tanggal').value    = data.tanggal_tanam;
    document.getElementById('statusSelect').value    = data.status;
    updateSelectColor();
  }

  async function handleUpdateTanaman(e) {
    e.preventDefault();
    const nama_tanaman  = document.getElementById('edit-nama').value.trim();
    const kategori      = document.getElementById('edit-kategori').value;
    const tanggal_tanam = document.getElementById('edit-tanggal').value;
    const status        = document.getElementById('statusSelect').value;
    const btn = document.getElementById('btn-simpan');
    btn.textContent = 'Menyimpan...'; btn.disabled = true;

    const { error } = await supabaseClient
      .from('kebun').update({ nama_tanaman, kategori, tanggal_tanam, status }).eq('id', idTanaman);

    if (error) {
      alert('Gagal memperbarui data: ' + error.message);
      btn.textContent = 'Simpan Perubahan'; btn.disabled = false;
    } else {
      window.location.replace('kebun.html');
    }
  }

  // ── DOMContentLoaded ──
  document.addEventListener('DOMContentLoaded', loadTanamanDetail);
</script>
</body>
</html>
