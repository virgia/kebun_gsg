<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kebun GSG 07 - Edit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: #fdf8f0;
        /* Tambahkan ini untuk memastikan body menutupi layar penuh */
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      select option {
        font-size: 10px !important;
        background-color: #ffffff;
      }
    </style>
  </head>
  <body class="pb-10">
    <div
      class="max-w-md w-full mx-3 bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden"
    >
      <nav
        class="flex items-center gap-3 p-4 text-white"
        style="background: linear-gradient(135deg, #1a3a1a 0%, #244f24 100%)"
      >
        <h1 class="font-bold text-lg">Edit Kondisi Tanaman</h1>
      </nav>

      <form
        id="form-edit"
        onsubmit="handleUpdateTanaman(event)"
        class="p-3 grid grid-cols-1 gap-4 text-xs"
      >
        <div>
          <label class="block font-semibold text-gray-600 mb-1"
            >Nama Tanaman</label
          >
          <input
            type="text"
            id="edit-nama"
            required
            class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:outline-emerald-600"
          />
        </div>

        <div>
          <label class="block font-semibold text-gray-600 mb-1"
            >Kategori Tanaman</label
          >
          <select
            id="edit-kategori"
            required
            class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:outline-emerald-600 bg-white font-medium"
          >
            <option value="Sayuran">Sayuran</option>
            <option value="Buah">Buah</option>
            <option value="Umbi-umbian">Umbi-umbian</option>
          </select>
        </div>

        <div>
          <label class="block font-semibold text-gray-600 mb-1"
            >Tanggal Tanam</label
          >
          <input
            type="date"
            id="edit-tanggal"
            required
            class="w-full border border-gray-300 p-2.5 rounded-lg text-sm focus:outline-emerald-600"
          />
        </div>

        <div>
          <label class="block font-semibold text-gray-600 mb-1"
            >Kondisi / Status Terbaru</label
          >
          <select
            id="statusSelect"
            onchange="updateSelectColor()"
            class="w-full border p-2.5 rounded-lg text-sm font-bold focus:outline-none transition-colors duration-200"
          >
            <option
              value="Pembibitan"
              class="bg-white text-blue-700 font-semibold"
            >
              Pembibitan
            </option>
            <option
              value="Pertumbuhan"
              class="bg-white text-emerald-700 font-semibold"
            >
              Pertumbuhan
            </option>
          </select>
        </div>

        <div class="pt-2 flex gap-2">
          <a
            href="kebun.html"
            class="w-1/3 text-center bg-gray-100 text-gray-700 font-bold p-2.5 rounded-lg border border-black/20 hover:bg-gray-200 transition"
          >
            Batal
          </a>
          <button
            type="submit"
            class="w-2/3 bg-green-900 text-white font-bold p-2.5 rounded-lg hover:bg-green-950 transition shadow"
          >
            Simpan
          </button>
        </div>
      </form>
    </div>

    <script>
      // (Script tetap sama seperti sebelumnya...)
      const sessionData = localStorage.getItem("user_session");
      if (!sessionData || JSON.parse(sessionData).role !== "Admin") {
        window.location.href = "kebun.html";
      }

      const SUPABASE_URL = "https://iyujfrhyggnpuzflznrk.supabase.co";
      const SUPABASE_KEY = "sb_publishable_s7lrRYSClBRfyqA8wYTkNA_OlOqbcsp";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY,
      );

      const urlParams = new URLSearchParams(window.location.search);
      const idTanaman = urlParams.get("id");
      if (!idTanaman) window.location.href = "kebun.html";

      function updateSelectColor() {
        const select = document.getElementById("statusSelect");
        const val = select.value;
        select.className =
          "w-full border p-2.5 rounded-lg text-sm font-bold focus:outline-none transition-colors duration-200 ";
        if (val === "Pembibitan")
          select.classList.add(
            "bg-blue-50",
            "text-blue-800",
            "border-blue-200",
          );
        else if (val === "Pertumbuhan")
          select.classList.add(
            "bg-emerald-50",
            "text-emerald-800",
            "border-emerald-200",
          );
      }

      async function loadTanamanDetail() {
        const { data, error } = await supabaseClient
          .from("kebun")
          .select("*")
          .eq("id", idTanaman)
          .single();
        if (error || !data) {
          alert("Data tidak ditemukan!");
          window.location.href = "kebun.html";
          return;
        }
        document.getElementById("edit-nama").value = data.nama_tanaman;
        document.getElementById("edit-kategori").value = data.kategori;
        document.getElementById("edit-tanggal").value = data.tanggal_tanam;
        document.getElementById("statusSelect").value = data.status;
        updateSelectColor();
      }

      async function handleUpdateTanaman(e) {
        e.preventDefault();
        const nama_tanaman = document.getElementById("edit-nama").value;
        const kategori = document.getElementById("edit-kategori").value;
        const tanggal_tanam = document.getElementById("edit-tanggal").value;
        const status = document.getElementById("statusSelect").value;
        const { error } = await supabaseClient
          .from("kebun")
          .update({ nama_tanaman, kategori, tanggal_tanam, status })
          .eq("id", idTanaman);
        if (error) alert("Gagal memperbarui data!");
        else window.location.href = "kebun.html";
      }

      window.onload = loadTanamanDetail;
    </script>
  </body>
</html>
