<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kebun GSG 07</title>
  <script>
    (function() {
      try { if (!localStorage.getItem('user_session')) window.location.replace('auth.html'); }
      catch(e) { window.location.replace('auth.html'); }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g-dark:   #1a3a1a;
      --g-mid:    #2d6a2d;
      --g-bright: #4caf50;
      --g-light:  #a8d5a2;
      --cream:    #ecebeb;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--cream);
      color: var(--g-dark);
      padding-top: 64px;
      padding-bottom: 80px;
    }

    /* Topbar */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 40;
      background: linear-gradient(135deg, #1a3a1a 0%, #244f24 100%);
      padding: 0.875rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; cursor: pointer; text-decoration: none;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .back-btn svg { width: 18px; height: 18px; }
    .topbar-title { font-size: 0.875rem; font-weight: 700; color: #fff; }
    .role-badge {
      font-size: 10px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; color: #fff;
      background: rgba(255,255,255,0.12);
    }
    .role-badge.admin { background: rgba(239,68,68,0.3); border: 1px solid rgba(239,68,68,0.4); }
    .role-badge.warga { background: rgba(59,130,246,0.3); border: 1px solid rgba(59,130,246,0.4); }

    /* Admin Form */
    .admin-form-box {
      background: #fff;
      border: 1.5px dashed rgba(45,106,45,0.3);
      border-radius: 12px; padding: 0.875rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      color: #4b5563; margin-bottom: 4px;
    }
    .form-input {
      width: 100%; border: 1px solid #d1d5db;
      border-radius: 8px; padding: 9px 12px;
      font-family: 'Poppins', sans-serif; font-size: 12px;
      color: #1a3a1a; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus { border-color: var(--g-mid); box-shadow: 0 0 0 2px rgba(45,106,45,0.12); }
    .form-select {
      width: 100%; border: 1px solid #d1d5db;
      border-radius: 8px; padding: 9px 12px;
      font-family: 'Poppins', sans-serif; font-size: 12px;
      background: #fff; font-weight: 600; color: #1a3a1a;
      outline: none; cursor: pointer;
    }
    .btn-tambah {
      width: 100%; background: var(--g-mid); color: #fff;
      font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 700;
      border: none; border-radius: 8px; padding: 10px;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-tambah:hover { background: var(--g-dark); }
    .btn-tambah:active { transform: scale(0.99); }
    .btn-tambah:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Search */
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--g-mid); pointer-events: none; }
    .search-input {
      width: 100%; background: #fff;
      border: 1px solid rgba(45,106,45,0.2); border-radius: 10px;
      padding: 8px 12px 8px 32px;
      font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 500; color: var(--g-dark);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus { border-color: var(--g-mid); box-shadow: 0 0 0 2px rgba(45,106,45,0.1); }
    .search-input::placeholder { color: #9ca3af; }

    /* Cards */
    .kebun-card {
      background: linear-gradient(135deg, #1a3a1a 0%, #244f24 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 0.875rem;
      display: flex; flex-direction: column; gap: 0;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      transition: transform 0.15s ease;
    }
    .kebun-card:active { transform: scale(0.99); }
    .kebun-card.hidden { display: none !important; }

    /* Baris atas: info kiri + badge status pojok kanan atas */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-nama {
      font-size: 13px; font-weight: 700; color: #fff;
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-meta { font-size: 11px; color: rgba(255,255,255,0.60); line-height: 1.7; }
    .card-meta span { color: rgba(255,255,255,0.9); font-weight: 600; }

    /* Kolom kanan: badge selalu nempel di atas */
    .card-right {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      padding-top: 1px;
    }

    /* Badge status */
    .badge {
      display: inline-block;
      font-size: 8px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; padding: 4px 10px; border-radius: 20px;
      white-space: nowrap; line-height: 1.2;
    }
    .badge-bibit  { background: rgba(59,130,246,0.18); color: #93c5fd; border: 1px solid rgba(59,130,246,0.35); }
    .badge-tumbuh { background: rgba(76,175,80,0.2);   color: #86efac; border: 1px solid rgba(76,175,80,0.4);  box-shadow: 0 1px 6px rgba(76,175,80,0.2); }
    .badge-siap   { background: rgba(245,158,11,0.18); color: #fcd34d; border: 1px solid rgba(245,158,11,0.4); }

    /* Garis pemisah tipis sebelum tombol */
    .card-divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 10px 0 0;
    }

    /* Tombol Ubah & Hapus — sejajar penuh, mudah di-tap */
    .admin-actions {
      display: flex; gap: 8px; margin-top: 8px;
    }
    .btn-edit, .btn-hapus {
      flex: 1;
      font-family: 'Poppins', sans-serif;
      font-size: 11px; font-weight: 700;
      padding: 7px 0; border-radius: 8px;
      cursor: pointer; border: 1px solid;
      text-align: center; text-decoration: none;
      display: block; transition: all 0.15s;
    }
    .btn-edit  { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }
    .btn-edit:hover  { background: rgba(255,255,255,0.18); }
    .btn-hapus { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); color: #fca5a5; }
    .btn-hapus:hover { background: #dc2626; color: #fff; border-color: #dc2626; }

    /* Skeleton */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skeleton-row {
      background: linear-gradient(135deg, #1a3a1a, #244f24);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 0.875rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .sk {
      background: linear-gradient(90deg, rgba(255,255,255,0.07) 25%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.07) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }

    /* Section heading */
    .section-label {
      font-size: 10px; font-weight: 700; color: var(--g-mid);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid rgba(45,106,45,0.15);
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 16px rgba(22,49,22,0.2);
      border-radius: 15px 15px 0 0;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.25rem; padding: 0.65rem 0.5rem;
      text-decoration: none; color: #9ca3af;
      font-size: 0.68rem; font-weight: 600; transition: color 0.15s;
    }
    .bottom-nav-item.active { color: var(--g-mid); }
    .bottom-nav-item svg { width: 22px; height: 22px; }

    /* Padding & spacing helpers */
    .page-content { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.75rem; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="beranda.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>
    </a>
    <span class="topbar-title">Daftar Tanaman Kebun</span>
  </div>
  <span id="badge-role" class="role-badge">—</span>
</div>

<div class="page-content">

  <!-- Admin Form (hidden untuk warga) -->
  <div id="admin-form-container" style="display:none;" class="admin-form-box">
    <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px;">
      <span style="width:8px; height:8px; border-radius:50%; background:#2d6a2d; display:inline-block; animation:pulse 1.5s infinite;"></span>
      <span style="font-size:10px; font-weight:700; color:var(--g-mid); text-transform:uppercase; letter-spacing:0.06em;">Form Tambah Tanaman</span>
    </div>
    <form id="form-tambah" onsubmit="handleTambahTanaman(event)" style="display:flex; flex-direction:column; gap:8px;">
      <div>
        <label class="form-label">Nama Tanaman</label>
        <input type="text" id="add-nama" class="form-input" placeholder="Contoh: Cabai Rawit, Tomat" required />
      </div>
      <div>
        <label class="form-label">Kategori</label>
        <select name="kategori" class="form-select" required>
          <option value="Sayuran">Sayuran</option>
          <option value="Buah">Buah</option>
          <option value="Umbi-umbian">Umbi-umbian</option>
        </select>
      </div>
      <div>
        <label class="form-label">Tanggal Tanam</label>
        <input type="date" id="add-tanggal" class="form-input" required />
      </div>
      <button type="submit" id="btn-submit-tanam" class="btn-tambah">Tambah Tanaman Baru</button>
    </form>
  </div>

  <!-- Search dengan debounce -->
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-tanaman" class="search-input" placeholder="Cari tanaman atau kategori..." oninput="debouncedFilter()" />
  </div>

  <div>
    <p class="section-label">List Tanaman Kebun</p>
  </div>

  <!-- Skeleton loading -->
  <div id="skeleton-list" style="display:flex; flex-direction:column; gap:8px;">
    <div class="skeleton-row"><div><div class="sk" style="height:14px; width:120px; margin-bottom:6px;"></div><div class="sk" style="height:10px; width:180px;"></div></div><div class="sk" style="height:20px; width:60px; border-radius:20px;"></div></div>
    <div class="skeleton-row"><div><div class="sk" style="height:14px; width:100px; margin-bottom:6px;"></div><div class="sk" style="height:10px; width:160px;"></div></div><div class="sk" style="height:20px; width:60px; border-radius:20px;"></div></div>
    <div class="skeleton-row"><div><div class="sk" style="height:14px; width:140px; margin-bottom:6px;"></div><div class="sk" style="height:10px; width:190px;"></div></div><div class="sk" style="height:20px; width:60px; border-radius:20px;"></div></div>
  </div>

  <div id="list-tanaman-container" style="display:none; flex-direction:column; gap:8px;"></div>
</div>

<nav class="bottom-nav">
  <a href="beranda.html" class="bottom-nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Beranda</span>
  </a>
  <a href="kebun.html" class="bottom-nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10a4 4 0 0 0-4-4H4v4a4 4 0 0 0 4 4h4z"/><path d="M12 10a4 4 0 0 1 4-4h4v4a4 4 0 0 1-4 4h-4z"/><path d="M12 10v10"/><path d="M8 22h8"/></svg>
    <span>Kebun</span>
  </a>
  <a href="panen.html" class="bottom-nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18l-1.5 9A3 3 0 0 1 16.5 21h-9a3 3 0 0 1-3-3L3 9Z"/><path d="M9 9V6a3 3 0 0 1 6 0v3"/><path d="M4 13h16"/></svg>
    <span>Panen</span>
  </a>
</nav>

<style>
  @keyframes pulse {
    0%,100% { opacity:1; }
    50%      { opacity:0.4; }
  }
</style>

<script>
  const user = JSON.parse(localStorage.getItem('user_session'));

  const SUPABASE_URL = "https://iyujfrhyggnpuzflznrk.supabase.co";
  const SUPABASE_KEY = "sb_publishable_s7lrRYSClBRfyqA8wYTkNA_OlOqbcsp";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Set badge role
  const badge = document.getElementById('badge-role');
  badge.textContent = user.role;
  if (user.role === 'Admin') {
    badge.classList.add('admin');
    document.getElementById('admin-form-container').style.display = 'block';
  } else {
    badge.classList.add('warga');
  }

  document.getElementById('add-tanggal').value = new Date().toISOString().split('T')[0];

  function formatTgl(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
  }

  // ── DEBOUNCE: filter hanya jalan setelah ketik berhenti 200ms ──
  let debounceTimer;
  function debouncedFilter() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(filterTanaman, 200);
  }

  function filterTanaman() {
    const q = (document.getElementById('search-tanaman').value || '').toLowerCase().trim();
    document.querySelectorAll('.js-kebun-card').forEach(card => {
      const nama = (card.dataset.nama || '').toLowerCase();
      const kat  = (card.dataset.kat  || '').toLowerCase();
      card.classList.toggle('hidden', q !== '' && !nama.includes(q) && !kat.includes(q));
    });
  }

  async function fetchKebunData() {
    const { data, error } = await supabaseClient
      .from('kebun').select('*').order('id', { ascending: false });

    const skeleton   = document.getElementById('skeleton-list');
    const container  = document.getElementById('list-tanaman-container');

    skeleton.style.display  = 'none';
    container.style.display = 'flex';

    if (error) {
      container.innerHTML = `<p style="font-size:11px; color:#ef4444; text-align:center; padding:1rem;">Gagal memuat: ${error.message}</p>`;
      return;
    }
    if (!data || data.length === 0) {
      container.innerHTML = `<div style="background:linear-gradient(135deg,#1a3a1a,#244f24); border-radius:12px; padding:2rem; text-align:center;"><p style="font-size:11px; color:rgba(255,255,255,0.6); font-style:italic;">Belum ada tanaman terdaftar.</p></div>`;
      return;
    }

    // Bangun HTML sekali — lebih efisien dari looping DOM
    container.innerHTML = data.map(row => {
      let badgeClass = 'badge-bibit', badgeLabel = 'Bibit';
      if (row.status === 'Pertumbuhan') { badgeClass = 'badge-tumbuh'; badgeLabel = 'Tumbuh'; }
      else if (row.status === 'Siap Panen') { badgeClass = 'badge-siap'; badgeLabel = 'Siap Panen'; }

      const adminHtml = user.role === 'Admin' ? `
        <div class="card-divider"></div>
        <div class="admin-actions">
          <a href="edit_kebun.html?id=${row.id}" class="btn-edit">Ubah</a>
          <button onclick="handleHapusTanaman(${row.id})" class="btn-hapus">Hapus</button>
        </div>` : '';

      return `
        <div class="kebun-card js-kebun-card" data-nama="${(row.nama_tanaman||'').toLowerCase()}" data-kat="${(row.kategori||'').toLowerCase()}">
          <div class="card-top">
            <div class="card-info">
              <div class="card-nama">${row.nama_tanaman}</div>
              <div class="card-meta">Kategori: <span>${row.kategori}</span></div>
              <div class="card-meta">Tgl Tanam: <span>${formatTgl(row.tanggal_tanam)}</span></div>
            </div>
            <div class="card-right">
              <span class="badge ${badgeClass}">${badgeLabel}</span>
            </div>
          </div>
          ${adminHtml}
        </div>`;
    }).join('');

    // Terapkan filter yang aktif (jika ada)
    filterTanaman();
  }

  async function handleTambahTanaman(e) {
    e.preventDefault();
    const nama_tanaman  = document.getElementById('add-nama').value.trim();
    const kategori      = document.querySelector('select[name="kategori"]').value;
    const tanggal_tanam = document.getElementById('add-tanggal').value;
    const btn = document.getElementById('btn-submit-tanam');
    btn.textContent = 'Menyimpan...'; btn.disabled = true;

    const { error } = await supabaseClient.from('kebun').insert([{ nama_tanaman, kategori, status: 'Bibit', tanggal_tanam }]);
    if (error) {
      alert('Gagal menambahkan: ' + error.message);
    } else {
      document.getElementById('form-tambah').reset();
      document.getElementById('add-tanggal').value = new Date().toISOString().split('T')[0];
      document.getElementById('search-tanaman').value = '';
      await fetchKebunData();
    }
    btn.textContent = 'Tambah Tanaman Baru'; btn.disabled = false;
  }

  async function handleHapusTanaman(id) {
    if (!confirm('Hapus data tanaman ini?')) return;
    const { error } = await supabaseClient.from('kebun').delete().eq('id', id);
    if (error) alert('Gagal menghapus: ' + error.message);
    else await fetchKebunData();
  }

  // ── DOMContentLoaded bukan window.onload ──
  document.addEventListener('DOMContentLoaded', fetchKebunData);

  // Konfigurasi durasi (5 menit dalam milidetik)
      const TIMEOUT_DURATION = 3 * 60 * 1000;
      let logoutTimer;

      function resetTimer() {
        clearTimeout(logoutTimer);
        logoutTimer = setTimeout(performLogout, TIMEOUT_DURATION);
      }

      function performLogout() {
        // 1. Hapus session dari localStorage
        localStorage.removeItem("user_session");

        // 2. Berikan penanda di URL bahwa user keluar karena timeout
        // Ini agar di halaman auth kita bisa memunculkan pesan box merah yang rapi daripada alert pop-up
        window.location.replace("auth.html?reason=timeout");
      }

      // Pantau aktivitas user di halaman ini
      document.addEventListener("DOMContentLoaded", resetTimer);
      document.addEventListener("mousemove", resetTimer);
      document.addEventListener("keypress", resetTimer);
      document.addEventListener("click", resetTimer);
      document.addEventListener("scroll", resetTimer);
      document.addEventListener("touchstart", resetTimer);
</script>
</body>
</html>
