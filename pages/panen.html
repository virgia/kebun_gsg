<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kebun GSG 07 — Panen</title>
    <script>
      (function () {
        try {
          if (!localStorage.getItem("user_session"))
            window.location.replace("auth.html");
        } catch (e) {
          window.location.replace("auth.html");
        }
      })();
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --g-dark: #1a3a1a;
        --g-mid: #2d6a2d;
        --g-bright: #4caf50;
        --g-light: #a8d5a2;
        --cream: #ecebeb;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--cream);
        color: var(--g-dark);
        padding-top: 64px;
        padding-bottom: 80px;
      }

      /* Topbar */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 40;
        background: linear-gradient(135deg, #1a3a1a 0%, #244f24 100%);
        padding: 0.875rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #fff;
        text-decoration: none;
        transition: background 0.2s;
      }
      .back-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .back-btn svg {
        width: 18px;
        height: 18px;
      }
      .topbar-title {
        font-size: 0.875rem;
        font-weight: 700;
        color: #fff;
      }
      .role-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
        color: #fff;
        background: rgba(255, 255, 255, 0.12);
      }
      .role-badge.admin {
        background: rgba(239, 68, 68, 0.3);
        border: 1px solid rgba(239, 68, 68, 0.4);
      }
      .role-badge.warga {
        background: rgba(59, 130, 246, 0.3);
        border: 1px solid rgba(59, 130, 246, 0.4);
      }

      /* Admin Form Panen */
      .admin-panen-box {
        background: #fff;
        border: 1.5px dashed rgba(220, 38, 38, 0.25);
        border-radius: 12px;
        padding: 0.875rem;
      }
      .form-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #4b5563;
        margin-bottom: 4px;
      }
      .form-input,
      .form-select {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 9px 12px;
        font-family: "Poppins", sans-serif;
        font-size: 12px;
        color: #1a3a1a;
        outline: none;
        background: #fff;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-input:focus,
      .form-select:focus {
        border-color: #059669;
        box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.1);
      }
      .form-select {
        font-weight: 600;
        cursor: pointer;
      }
      .btn-siar {
        width: 100%;
        background: #d97706;
        color: #fff;
        font-family: "Poppins", sans-serif;
        font-size: 12px;
        font-weight: 700;
        border: none;
        border-radius: 8px;
        padding: 10px;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
        margin-top: 4px;
      }
      .btn-siar:hover {
        background: #b45309;
      }
      .btn-siar:active {
        transform: scale(0.99);
      }
      .btn-siar:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* Panen Cards */
      .panen-card {
        background: linear-gradient(135deg, #1a3a1a 0%, #244f24 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 1rem;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
        transition: transform 0.15s ease;
      }
      .panen-card:active {
        transform: scale(0.99);
      }

      .panen-tag {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 2px 8px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .panen-tanggal {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 500;
      }
      .panen-nama {
        font-size: 15px;
        font-weight: 700;
        color: #fde68a;
        margin: 8px 0 6px;
      }
      .panen-nama span {
        font-weight: 400;
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
      }
      .panen-catatan {
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.9);
        background: rgba(255, 255, 255, 0.05);
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        line-height: 1.5;
      }
      .btn-hapus-panen {
        font-size: 9px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid rgba(239, 68, 68, 0.3);
        background: rgba(239, 68, 68, 0.1);
        color: #fca5a5;
        transition: all 0.15s;
      }
      .btn-hapus-panen:hover {
        background: #dc2626;
        color: #fff;
        border-color: #dc2626;
      }

      /* Skeleton */
      @keyframes shimmer {
        0% {
          background-position: -400px 0;
        }
        100% {
          background-position: 400px 0;
        }
      }
      .sk {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.07) 25%,
          rgba(255, 255, 255, 0.15) 50%,
          rgba(255, 255, 255, 0.07) 75%
        );
        background-size: 800px 100%;
        animation: shimmer 1.4s infinite linear;
        border-radius: 6px;
      }
      .skeleton-panen {
        background: linear-gradient(135deg, #1a3a1a, #244f24);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 1rem;
      }

      /* Bottom Nav */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #fff;
        border-top: 1px solid rgba(76, 175, 80, 0.15);
        display: flex;
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom);
        box-shadow: 0 -4px 16px rgba(22, 49, 22, 0.2);
        border-radius: 15px 15px 0 0;
      }
      .bottom-nav-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.25rem;
        padding: 0.65rem 0.5rem;
        text-decoration: none;
        color: #9ca3af;
        font-size: 0.68rem;
        font-weight: 600;
        transition: color 0.15s;
      }
      .bottom-nav-item.active {
        color: var(--g-mid);
      }
      .bottom-nav-item svg {
        width: 22px;
        height: 22px;
      }

      .page-content {
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-left">
        <a href="beranda.html" class="back-btn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 19l-7-7 7-7" />
          </svg>
        </a>
        <span class="topbar-title">Pengumuman Panen</span>
      </div>
      <span id="badge-role" class="role-badge">—</span>
    </div>

    <div class="page-content">
      <!-- Form Admin Panen -->
      <div
        id="admin-panen-container"
        style="display: none"
        class="admin-panen-box"
      >
        <div
          style="
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
          "
        >
          <span
            style="
              width: 8px;
              height: 8px;
              border-radius: 50%;
              background: #dc2626;
              display: inline-block;
              animation: pulse 1.5s infinite;
            "
          ></span>
          <span
            style="
              font-size: 10px;
              font-weight: 700;
              color: #7f1d1d;
              text-transform: uppercase;
              letter-spacing: 0.06em;
            "
            >Form Kirim Kabar Panen</span
          >
        </div>
        <form
          id="form-panen"
          onsubmit="handleTambahPanen(event)"
          style="display: flex; flex-direction: column; gap: 8px"
        >
          <div>
            <label class="form-label">Pilih Tanaman yang Dipetik</label>
            <select id="select-tanaman" class="form-select" required>
              <option value="">— Memuat opsi tanaman —</option>
            </select>
          </div>
          <div>
            <label class="form-label">Tanggal Panen</label>
            <input type="date" id="panen-tanggal" class="form-input" required />
          </div>
          <div>
            <label class="form-label">Catatan</label>
            <input
              type="text"
              id="panen-catatan"
              class="form-input"
              placeholder="Contoh: Segera merapat, selama masih tersedia!"
              required
            />
          </div>
          <button type="submit" id="btn-siar" class="btn-siar">
            Siarkan Kabar Panen
          </button>
        </form>
      </div>

      <!-- Skeleton -->
      <div
        id="skeleton-panen"
        style="display: flex; flex-direction: column; gap: 8px"
      >
        <div class="skeleton-panen">
          <div
            class="sk"
            style="height: 12px; width: 80px; margin-bottom: 10px"
          ></div>
          <div
            class="sk"
            style="height: 16px; width: 140px; margin-bottom: 8px"
          ></div>
          <div class="sk" style="height: 40px"></div>
        </div>
        <div class="skeleton-panen">
          <div
            class="sk"
            style="height: 12px; width: 80px; margin-bottom: 10px"
          ></div>
          <div
            class="sk"
            style="height: 16px; width: 120px; margin-bottom: 8px"
          ></div>
          <div class="sk" style="height: 40px"></div>
        </div>
      </div>

      <div
        id="list-panen-container"
        style="display: none; flex-direction: column; gap: 0.75rem"
      ></div>
    </div>

    <nav class="bottom-nav">
      <a href="beranda.html" class="bottom-nav-item">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Beranda</span>
      </a>
      <a href="kebun.html" class="bottom-nav-item">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 10a4 4 0 0 0-4-4H4v4a4 4 0 0 0 4 4h4z" />
          <path d="M12 10a4 4 0 0 1 4-4h4v4a4 4 0 0 1-4 4h-4z" />
          <path d="M12 10v10" />
          <path d="M8 22h8" />
        </svg>
        <span>Kebun</span>
      </a>
      <a href="panen.html" class="bottom-nav-item active">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 9h18l-1.5 9A3 3 0 0 1 16.5 21h-9a3 3 0 0 1-3-3L3 9Z" />
          <path d="M9 9V6a3 3 0 0 1 6 0v3" />
          <path d="M4 13h16" />
        </svg>
        <span>Panen</span>
      </a>
      <a href="profil.html" class="bottom-nav-item">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>Profil</span>
      </a>
    </nav>

    <style>
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
    </style>

    <script>
      const user = JSON.parse(localStorage.getItem("user_session"));

      const SUPABASE_URL = "https://iyujfrhyggnpuzflznrk.supabase.co";
      const SUPABASE_KEY = "sb_publishable_s7lrRYSClBRfyqA8wYTkNA_OlOqbcsp";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY,
      );

      const badge = document.getElementById("badge-role");
      badge.textContent = user.role;
      badge.classList.add(user.role === "Admin" ? "admin" : "warga");
      if (user.role === "Admin") {
        document.getElementById("admin-panen-container").style.display =
          "block";
      }

      document.getElementById("panen-tanggal").value = new Date()
        .toISOString()
        .split("T")[0];

      function formatTgl(d) {
        if (!d) return "—";
        return new Date(d).toLocaleDateString("id-ID", {
          day: "2-digit",
          month: "short",
          year: "numeric",
        });
      }

      async function loadTanamanOpsi() {
        const { data, error } = await supabaseClient
          .from("kebun")
          .select("nama_tanaman")
          .neq("status", "Siap Panen");
        const sel = document.getElementById("select-tanaman");
        if (error || !data || data.length === 0) {
          sel.innerHTML = `<option value="" disabled>Tidak ada tanaman yang bisa dipanen</option>`;
          return;
        }
        const unik = [...new Set(data.map((i) => i.nama_tanaman))].sort();
        sel.innerHTML =
          `<option value="">— Pilih Tanaman —</option>` +
          unik.map((n) => `<option value="${n}">${n}</option>`).join("");
      }

      async function fetchPanenData() {
        const { data, error } = await supabaseClient
          .from("panen")
          .select("*")
          .order("id", { ascending: false });

        const skeleton = document.getElementById("skeleton-panen");
        const container = document.getElementById("list-panen-container");
        skeleton.style.display = "none";
        container.style.display = "flex";

        if (error || !data || data.length === 0) {
          container.innerHTML = `<div style="background:#fff; border-radius:12px; border:1px solid #e5e7eb; padding:3rem 1rem; text-align:center;"><p style="font-size:12px; color:#9ca3af; font-style:italic;">Belum ada pengumuman hasil petikan terbaru.</p></div>`;
          return;
        }

        container.innerHTML = data
          .map((row) => {
            const hapusBtn =
              user.role === "Admin"
                ? `<button onclick="handleHapusPanen(${row.id},'${row.nama_tanaman}')" class="btn-hapus-panen">Hapus</button>`
                : "";
            return `
        <div class="panen-card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <span class="panen-tag">Kabar Panen</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="panen-tanggal">${formatTgl(row.tanggal_panen)}</span>
              ${hapusBtn}
            </div>
          </div>
          <div class="panen-nama">${row.nama_tanaman} <span>Siap dipetik!</span></div>
          <div class="panen-catatan"><strong>Catatan:</strong> ${row.catatan}</div>
        </div>`;
          })
          .join("");
      }

      async function handleTambahPanen(e) {
        e.preventDefault();
        const nama_tanaman = document.getElementById("select-tanaman").value;
        const tanggal_panen = document.getElementById("panen-tanggal").value;
        const catatan = document.getElementById("panen-catatan").value;
        const btn = document.getElementById("btn-siar");
        btn.textContent = "Menyiarkan...";
        btn.disabled = true;

        const { error: errPanen } = await supabaseClient
          .from("panen")
          .insert([{ nama_tanaman, tanggal_panen, catatan }]);
        if (errPanen) {
          alert("Gagal menyiarkan kabar panen!");
          btn.textContent = "Siarkan Kabar Panen";
          btn.disabled = false;
          return;
        }

        const { error: errKebun } = await supabaseClient
          .from("kebun")
          .update({ status: "Siap Panen" })
          .eq("nama_tanaman", nama_tanaman);
        if (errKebun)
          console.error("Gagal update status kebun:", errKebun.message);

        document.getElementById("form-panen").reset();
        document.getElementById("panen-tanggal").value = new Date()
          .toISOString()
          .split("T")[0];
        btn.textContent = "Siarkan Kabar Panen";
        btn.disabled = false;

        // Muat ulang data secara paralel
        await Promise.all([loadTanamanOpsi(), fetchPanenData()]);
      }

      async function handleHapusPanen(id, nama_tanaman) {
        if (
          !confirm(
            "Hapus kabar panen ini? Status tanaman akan dikembalikan ke Pertumbuhan.",
          )
        )
          return;

        const { error: errDel } = await supabaseClient
          .from("panen")
          .delete()
          .eq("id", id);
        if (errDel) {
          alert("Gagal menghapus kabar panen!");
          return;
        }

        const { error: errUpd } = await supabaseClient
          .from("kebun")
          .update({ status: "Pertumbuhan" })
          .eq("nama_tanaman", nama_tanaman)
          .eq("status", "Siap Panen");
        if (errUpd) console.error("Gagal kembalikan status:", errUpd.message);

        // Reload paralel
        await Promise.all([fetchPanenData(), loadTanamanOpsi()]);
      }

      // ── DOMContentLoaded + query paralel ──
      document.addEventListener("DOMContentLoaded", () => {
        Promise.all([loadTanamanOpsi(), fetchPanenData()]);
      });

      // Konfigurasi durasi (5 menit dalam milidetik)
      const TIMEOUT_DURATION = 3 * 60 * 1000;
      let logoutTimer;

      function resetTimer() {
        clearTimeout(logoutTimer);
        logoutTimer = setTimeout(performLogout, TIMEOUT_DURATION);
      }

      function performLogout() {
        // 1. Hapus session dari localStorage
        localStorage.removeItem("user_session");

        // 2. Berikan penanda di URL bahwa user keluar karena timeout
        // Ini agar di halaman auth kita bisa memunculkan pesan box merah yang rapi daripada alert pop-up
        window.location.replace("auth.html?reason=timeout");
      }

      // Pantau aktivitas user di halaman ini
      document.addEventListener("DOMContentLoaded", resetTimer);
      document.addEventListener("mousemove", resetTimer);
      document.addEventListener("keypress", resetTimer);
      document.addEventListener("click", resetTimer);
      document.addEventListener("scroll", resetTimer);
      document.addEventListener("touchstart", resetTimer);
    </script>
  </body>
</html>
